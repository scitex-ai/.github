name: pytest-matrix

# REUSABLE WORKFLOW — org-level pilot (scitex-stats, 2026-07-10).
# Mechanically extracted from the `pytest-matrix` job in
# scitex-ai/scitex-stats `.github/workflows/ci.yml`. No inputs: the package
# name is auto-derived from `src/<pkg>` in the checkout (same as the
# original), and the python-version matrix / runner label are identical
# across every caller today, so nothing needs to be parameterized yet.
# CODECOV_TOKEN must be available to the caller (secrets: inherit).
#
# CALLERS MUST USE THE JOB ID `pytest-matrix`. Copy the stub from
# workflow-templates/pytest-matrix.yml; do not write your own. The check name
# GitHub renders is "<caller job id> / <this job's name>", so the caller's job id
# IS the branch-protection context prefix: name it anything else and that repo
# emits a check name no other repo emits, which means a bespoke required-check
# list for it forever. See the README's "Caller job ids" section.

on:
  workflow_call: {}

jobs:
  pytest-matrix:
    # This name is the SECOND half of the required status check. The full context
    # a caller emits is "pytest-matrix / pytest-matrix-on-ubuntu-py3.11" (given the
    # mandated caller job id above). Renaming this breaks branch protection in
    # every repo at once — reconcile protection in the same change if you ever do.
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    runs-on: [self-hosted, Linux, X64, spartan-cpu]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          cache-dependency-glob: pyproject.toml
        # NOTE: a per-runner RUNNER_TOOL_CACHE override was tried here and
        # REMOVED as a no-op. RUNNER_TOOL_CACHE is a runner-reserved default;
        # a workflow-level `env:` does NOT override it (measured 2026-07-23,
        # scitex-hpc ci run 30028631599: the step still resolved the runner's
        # ~/.runner-toolcache, not the override). The shared-toolcache flake
        # (setup-uv concurrent-populate mutual destruction) can only be fixed
        # where the RUNNER exports the variable — the launcher script
        # (relaunch-scitex-hpc-runner.sh), per-runner + node-local. Tracked in
        # scitex-hpc card ci-runner-toolcache-per-runner-launcher-ssot-20260723.
      - name: Install (.[all,dev]) + pytest
        run: |
          set -euo pipefail
          # --seed puts pip/setuptools/wheel IN the venv. A bare `uv venv`
          # ships none of them, so any test that shells out to
          # `sys.executable -m pip ...` gets "No module named pip". That is
          # a regression against the per-repo workflows this reusable
          # replaced: they all built the env with actions/setup-python +
          # `pip install`, so pip was always present.
          # Caught by scitex-hub PR #433 — its pip-install e2e gate proves
          # the production `pip_install_user_app` argv shape and went red
          # on exactly this.
          uv venv --seed --python ${{ matrix.python-version }} .venv
          uv pip install --python .venv/bin/python -e ".[all,dev]" \
            || uv pip install --python .venv/bin/python -e ".[dev]" \
            || uv pip install --python .venv/bin/python -e .
          # pytest-xdist is installed EXPLICITLY, not relied on transitively.
          # scitex-dev declares it, but only under its OWN [dev] extra — and a
          # package depending on plain `scitex-dev` does NOT get that extra, so
          # `-n` was silently unavailable in most repos. Installing it here makes
          # the flag below work for every caller regardless of its extras.
          uv pip install --python .venv/bin/python "pytest-xdist>=3.0.0"
          # kaleido/plotly image export needs Chrome; install best-effort (no-op for non-plotly repos)
          yes | .venv/bin/plotly_get_chrome >/dev/null 2>&1 || true
          # .venv/bin on PATH so console-scripts installed into the venv are
          # resolvable from inside the test process. Tests that gate on
          # `shutil.which("<tool>")` SKIP silently without this — they do not
          # fail, so the suite still reports green while the gate never ran.
          # Observed in scitex-hub: tests/develop/test_audit.py (the brand
          # quality gate) went from PASSED on the retired setup-python
          # workflow to SKIPPED here, because `scitex-dev` was installed in
          # .venv but not on PATH. quality-audit.yml already does this.
          export PATH="$PWD/.venv/bin:$PATH"
          PKG=$(basename "$(find src -maxdepth 1 -mindepth 1 -type d ! -name '*.egg-info' | sort | head -1)")
          # -n auto: the suite ran SINGLE-PROCESS on a multi-core Spartan lease,
          # so the runner's cores sat idle while wall-clock grew with the suite.
          # Operator ruling 2026-07-19: 「全てのレポジトリで xdist 並列です、
          # あたりまえですけど」.
          #
          # Measured on scitex-cards (3179 tests, contended 16-core box):
          #   single-process    8m39s
          #   -n auto (16 wk)   6m37s   and 0 failures — the suite is xdist-safe
          # The gap is far larger on a quiet dedicated runner: the same suite was
          # taking 17-21 min per leg here, and after a test-quality pass grew it
          # to 4462 tests the legs got slower still. That is what motivated this.
          #
          # IF YOUR SUITE IS NOT XDIST-SAFE (order-dependent, or sharing on-disk
          # state across tests) this surfaces as FAILURES here, not as silence.
          # Fix the shared state, or pin `-p no:xdist` in that repo's own pytest
          # config — do not drop the flag for every other repo.
          #
          # ...but `auto` ALONE OVERSUBSCRIBES ~2.7x on these runners. Measured on
          # spartan-bm155 inside a live 48-CPU lease cgroup (job_27144058/step_extern):
          #   os.sched_getaffinity(0)         -> 48   (the actual allocation)
          #   os.cpu_count()                  -> 128
          #   psutil.cpu_count(logical=False) -> 128  <- what `auto` resolves to
          # xdist's pytest_xdist_auto_num_workers consults psutil FIRST and returns
          # immediately (xdist/plugin.py 3.8.0); only if psutil is ABSENT does it fall
          # back to sched_getaffinity, which would have been correct. So `auto` is
          # right without psutil and wrong with it. Corroborated in scitex-hub CI:
          # worker ids reached gw121 on a 48-CPU lease.
          #
          # PYTEST_XDIST_AUTO_NUM_WORKERS is consulted AHEAD of psutil, so this
          # corrects `auto` without hardcoding a worker count.
          #
          # Do NOT key this on $SLURM_CPUS_PER_TASK / $SLURM_JOB_CPUS_PER_NODE: both
          # are EMPTY here. The runner is ssh-adopted into the lease cgroup, so it
          # inherits the cpuset but NOT the step environment. sched_getaffinity reads
          # the cpuset directly and is the only thing that works. (ADR-0004 P1(b)
          # prescribed the SLURM-var form and was wrong; corrected in scitex-dev.)
          export PYTEST_XDIST_AUTO_NUM_WORKERS="$(.venv/bin/python -c 'import os; print(len(os.sched_getaffinity(0)))')"
          .venv/bin/python -m pytest tests/ -n auto \
            --cov="src/$PKG" --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

name: zz-spartan-capability-probe

# TEMPORARY probe (branch-only, deleted before merge). Answers the one
# question that gates moving `auto-merge-to-develop` and `cla` onto Spartan:
# does the Spartan org-pool runner actually have the tools those workflows
# shell out to? Merging that change blind would break PR auto-merge and the
# CLA check across the whole org if `gh` is absent.
#
# Runs only on this branch. Never merged to main.

on:
  push:
    branches: [ci/spartan-only-runners]

jobs:
  probe:
    runs-on: [self-hosted, Linux, X64, spartan-cpu]
    steps:
      - name: Which runner am I on
        run: |
          echo "host=$(hostname)"
          echo "runner_name=${RUNNER_NAME:-?}"
          echo "pwd=$(pwd)"

      - name: gh CLI present? (REQUIRED by auto-merge + cla)
        run: |
          if command -v gh >/dev/null 2>&1; then
            echo "GH_PRESENT=yes"
            echo "GH_PATH=$(command -v gh)"
            gh --version
          else
            echo "GH_PRESENT=no"
            echo "::warning::gh CLI is NOT on PATH — auto-merge-to-develop and cla would FAIL on this runner"
          fi

      - name: Other tools those workflows assume
        run: |
          for t in git node bash jq curl; do
            if command -v "$t" >/dev/null 2>&1; then
              echo "$t=$(command -v $t)"
            else
              echo "$t=MISSING"
            fi
          done
